name: Daily GFFI Update

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Force Node.js 24

jobs:
  update-gffi-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy
      
      - name: 🔄 Check scripts folder
        run: |
          ls -la scripts/ || echo "scripts folder not found"
      
      - name: 🔄 Run GFFI update script
        run: |
          if [ -f "scripts/update_gffi.py" ]; then
            python scripts/update_gffi.py
          else
            echo "❌ scripts/update_gffi.py not found!"
            exit 1
          fi
      
      - name: 💾 Commit changes
        run: |
          git config --global user.name 'GFFI Bot'
          git config --global user.email 'gffi-bot@users.noreply.github.com'
          git add script.js
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Daily GFFI update - $(date +'%Y-%m-%d')"
          git push
