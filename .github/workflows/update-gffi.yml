name: Daily GFFI Update

on:
  schedule:
   - cron: '*/60 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-gffi-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy
      
      - name: 🔍 Debug - List files
        run: |
          pwd
          ls -la
          ls -la scripts/ || echo "scripts folder not found"
      
      - name: 🔄 Run GFFI update script
        run: python scripts/update_gffi.py
      
      - name: 💾 Commit and push changes
        run: |
          git config --global user.name 'GFFI Bot'
          git config --global user.email 'gffi-bot@users.noreply.github.com'
          git add script.js
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🤖 Daily GFFI update - $(date +'%Y-%m-%d')"
            git pull --rebase origin main
            git push origin main
          fi
