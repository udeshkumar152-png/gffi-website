<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GFFI Dashboard</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- HEADER -->
    <div class="container">
        <div class="header">
            <h1>🌍 Global Financial Fragility Index (GFFI)</h1>
            <p>Live Financial Risk Dashboard</p>
        </div>

        <!-- GLOBAL GFFI -->
        <div class="global-box">
            <h2 id="global-gffi">Loading...</h2>
            <p>Global Risk Level</p>
        </div>

        <!-- TOGGLE BUTTON -->
        <button id="toggle-view" class="btn-toggle">Toggle View</button>

        <!-- COUNTRY DATA -->
        <div id="country-grid" class="country-grid"></div>

        <!-- INDIA CARD -->
        <div class="india-cards"></div>

        <!-- CHANGE INDICATOR -->
        <div class="footer">
            <p id="change-indicator">Loading...</p>
            <p id="update-time">Updating...</p>
        </div>
    </div>

    <!-- LOAD DATA -->
    <script src="data.js"></script>

    <!-- MAIN LOGIC -->
    <script src="functions.js"></script>

    <!-- SAFE INIT -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {

            // Global GFFI
            const globalEl = document.getElementById("global-gffi");
            if (globalEl && typeof globalGFFI !== "undefined") {
                globalEl.innerText = globalGFFI;
            }

            // Update time
            const timeEl = document.getElementById("update-time");
            if (timeEl && typeof updateDate !== "undefined") {
                timeEl.innerText = "Last Updated: " + updateDate + " " + updateTime;
            }

            console.log("✅ Dashboard Loaded");
            console.log("📊 Data:", countryData);

        });
    </script>

</body>

</html>
