<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GFFI Pro Dashboard</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <h1>🌍 GFFI Pro Dashboard</h1>
        <p>Global Financial Risk Monitor</p>
    </div>

    <!-- GLOBAL CARD -->
    <div class="global-box">
        <h2 id="global-gffi">Loading...</h2>
        <p>Global Risk Level</p>
    </div>

    <!-- ALERT -->
    <div id="alert-box" class="alert-box"></div>

    <!-- CHART -->
    <canvas id="gffiChart"></canvas>

    <!-- COUNTRY GRID -->
    <div id="country-grid" class="grid"></div>

    <!-- FOOTER -->
    <div class="footer">
        <p id="update-time"></p>
    </div>

</div>

<!-- DATA -->
<script src="data.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

    // =====================
    // GLOBAL VALUE
    // =====================
    document.getElementById("global-gffi").innerText =
        "GFFI: " + globalGFFI;

    // =====================
    // ALERT SYSTEM
    // =====================
    let max = Math.max(...countryData.map(c => c.gffi));
    let alertBox = document.getElementById("alert-box");

    if (max >= 15) {
        alertBox.innerText = "🚨 CRITICAL RISK!";
        alertBox.className = "alert critical";
    } else if (max >= 10) {
        alertBox.innerText = "⚠️ WARNING";
        alertBox.className = "alert warning";
    } else {
        alertBox.innerText = "✅ STABLE";
        alertBox.className = "alert safe";
    }

    // =====================
    // COUNTRY CARDS
    // =====================
    const grid = document.getElementById("country-grid");

    let html = "";

    countryData.forEach(c => {

        let statusClass =
            c.gffi >= 15 ? "critical" :
            c.gffi >= 10 ? "warning" :
            c.gffi >= 5 ? "moderate" : "safe";

        html += `
        <div class="card ${statusClass}">
            <h3>${c.flag} ${c.name}</h3>
            <p class="value">${c.gffi}</p>
            <span class="badge">${statusClass.toUpperCase()}</span>
        </div>
        `;
    });

    grid.innerHTML = html;

    // =====================
    // CHART
    // =====================
    const ctx = document.getElementById('gffiChart');

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: countryData.map(c => c.name),
            datasets: [{
                label: 'GFFI',
                data: countryData.map(c => c.gffi),
                backgroundColor: countryData.map(c =>
                    c.gffi >= 15 ? 'red' :
                    c.gffi >= 10 ? 'orange' :
                    c.gffi >= 5 ? 'yellow' : 'green'
                )
            }]
        }
    });

    // =====================
    // UPDATE TIME
    // =====================
    document.getElementById("update-time").innerText =
        "Last Updated: " + updateDate + " " + updateTime;

});
</script>

</body>
</html>
