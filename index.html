<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GFFI Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>🌍 Global Financial Fragility Index (GFFI)</h1>

    <h2 id="global">Loading...</h2>

    <div id="country-grid"></div>

    <p id="update"></p>

</div>

<!-- DATA -->
<script src="data.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

    // =============================
    // GLOBAL VALUE
    // =============================
    document.getElementById("global").innerText =
        "Global GFFI: " + globalGFFI;

    // =============================
    // COUNTRY RENDER
    // =============================
    const container = document.getElementById("country-grid");

    let html = "";

    countryData.forEach(c => {

        let color = "green";
        let label = "SAFE";

        if (c.gffi >= 15) {
            color = "red";
            label = "CRITICAL";
        }
        else if (c.gffi >= 10) {
            color = "orange";
            label = "WARNING";
        }
        else if (c.gffi >= 5) {
            color = "gold";
            label = "MODERATE";
        }

        html += `
        <div class="card" style="border-left:5px solid ${color}">
            <h3>${c.flag} ${c.name}</h3>
            <p>GFFI: ${c.gffi}</p>
            <p style="color:${color}">${label}</p>
        </div>
        `;
    });

    container.innerHTML = html;

    // =============================
    // UPDATE TIME
    // =============================
    document.getElementById("update").innerText =
        "Last Updated: " + updateDate + " " + updateTime;

});
</script>

</body>
</html>
