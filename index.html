<!DOCTYPE html>
<html>
<head>
  <title>GFFI Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="font-family: Arial; text-align: center;">

<h1>📊 Global Financial Fragility Index</h1>

<canvas id="chart" width="800" height="400"></canvas>

<h2 id="status"></h2>

<script>
fetch("data.json")
.then(res => res.json())
.then(data => {

  const labels = data.map(d => d.date);
  const values = data.map(d => d.gffi);

  const ctx = document.getElementById("chart").getContext("2d");

  new Chart(ctx, {
    type: "line",
    data: {
      labels: labels,
      datasets: [{
        label: "GFFI",
        data: values,
        borderWidth: 2
      }]
    }
  });

  const latest = values[values.length - 1];

  let status = "";
  if (latest < 5) status = "✅ LOW RISK";
  else if (latest < 10) status = "⚠️ MODERATE RISK";
  else if (latest < 15) status = "🚨 HIGH RISK";
  else status = "🔥 EXTREME RISK";

  document.getElementById("status").innerText = "Current GFFI: " + latest.toFixed(2) + " → " + status;

});
</script>

</body>
</html>
