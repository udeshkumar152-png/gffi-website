<!DOCTYPE html>
<html>
<head>
<title>GFFI AI Pro</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

<h1>🌍 GFFI AI PRO</h1>

<h2 id="global"></h2>
<h3 id="trend"></h3>
<h3 id="ml"></h3>
<h3 id="lstm"></h3>

<canvas id="chart"></canvas>

<div id="grid"></div>

<p id="update"></p>

</div>

<script src="data.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

const safe = (v) => (typeof v !== "undefined" ? v : "N/A");

document.getElementById("global").innerText =
"Global GFFI: " + safe(globalGFFI);

document.getElementById("trend").innerText =
"📈 Trend: " + safe(trendPrediction);

document.getElementById("ml").innerText =
"🤖 ML: " + safe(mlPrediction);

document.getElementById("lstm").innerText =
"🧠 LSTM: " + safe(lstmPrediction);

// GRID
let html = "";
countryData.forEach(c => {
    html += `<div class="card">${c.flag} ${c.name}<br>${c.gffi}</div>`;
});
document.getElementById("grid").innerHTML = html;

// CHART
new Chart(document.getElementById("chart"), {
type: "bar",
data: {
labels: countryData.map(c=>c.name),
datasets: [{ data: countryData.map(c=>c.gffi) }]
}
});

// UPDATE
document.getElementById("update").innerText =
"Updated: " + updateDate + " " + updateTime;

// ALERT
if (safe(mlPrediction) >= 15) alert("🚨 ML Risk!");
});
</script>

</body>
</html>
